server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:medical_db
    driver-class-name: org.h2.Driver
    username: medical
    password: 'medical2}'
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.medical: DEBUG
